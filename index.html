<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lotto Picker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    :root {
      --color-primary: #0066cc;
      --color-ink: #1d1d1f;
      --color-canvas: #ffffff;
      --color-canvas-parchment: #f5f5f7;
      --color-muted: #6e6e73;
      --color-error: #b00020;
      --radius-pill: 980px;
      --radius-utility: 8px;
      --radius-card: 18px;
      --font-body: 'Pretendard', -apple-system, sans-serif;
      --ball-yellow: #f5a623;
      --ball-blue: #0066cc;
      --ball-red: #e03131;
      --ball-gray: #868e96;
      --ball-green: #2f9e44;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f5f7;
      color: var(--color-ink);
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 17px;
      line-height: 1.47;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .hero {
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 48px 24px;
      background: #1d1d1f;
      text-align: center;
    }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #ffffff;
      font-size: 40px;
      line-height: 1.1;
      font-weight: 600;
      letter-spacing: 0;
      text-align: center;
    }

    h2 {
      font-size: 24px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: 0;
    }

    .summary {
      color: rgba(255, 255, 255, 0.6);
      font-size: 17px;
    }

    .panel {
      background: #ffffff;
      border: none;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }

    .actions {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-top: 20px;
    }

    .button {
      min-height: 48px;
      border: 0;
      border-radius: 980px;
      padding: 12px 24px;
      background: #0066cc;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      flex: 1 1 0;
      min-width: 0;
      width: auto;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .button:hover {
      opacity: 0.85;
    }

    .button:active {
      transform: scale(0.97);
    }

    .button:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
    }


    #frequency-button {
      background: #0066cc;
      color: #ffffff;
    }

    #overdue-button {
      background: #2f9e44;
      color: #ffffff;
    }

    #history-first-button {
      background: #1d1d1f;
      color: #ffffff;
    }

    #history-second-button {
      background: #868e96;
      color: #ffffff;
    }

    #fortune-button {
      background: #6741d9;
      color: #ffffff;
    }

    #birthday-button {
      background: #e03131;
      color: #ffffff;
    }

    .birthday-panel {
      display: none;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 12px;
    }

    .birthday-panel.open {
      display: grid;
    }

    .birthday-panel input {
      min-width: 0;
      border: 1px solid #d0d0d5;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
    }

    .birthday-panel .button {
      min-height: 42px;
      padding: 10px 18px;
      background: #e03131;
    }

    .result {
      display: grid;
      gap: 18px;
    }

    .result-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    .mode-label {
      color: var(--color-muted);
      font-size: 14px;
    }

    .balls {
      display: grid;
      grid-template-columns: repeat(6, minmax(72px, 1fr));
      gap: 14px;
    }

    .ball-wrap {
      display: grid;
      justify-items: center;
      gap: 8px;
      min-width: 0;
    }

    .ball {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      color: #ffffff;
      font-size: 21px;
      font-weight: 600;
      line-height: 1;
      border: 1px solid rgba(0, 0, 0, 0.08);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .ball.yellow {
      background: var(--ball-yellow);
      color: var(--color-ink);
      text-shadow: none;
    }

    .ball.blue {
      background: var(--ball-blue);
    }

    .ball.red {
      background: var(--ball-red);
    }

    .ball.gray {
      background: var(--ball-gray);
    }

    .ball.green {
      background: var(--ball-green);
    }

    .ball.pending {
      background: #cccccc;
      color: #ffffff;
      text-shadow: none;
    }

    .ball.bounce {
      animation: ball-bounce 200ms ease-out;
    }

    @keyframes ball-bounce {
      0% {
        transform: scale(1.3);
      }

      100% {
        transform: scale(1);
      }
    }

    .metric {
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.3;
      text-align: center;
      word-break: keep-all;
    }

    .prize-history {
      grid-column: 1 / -1;
      background: #f5f5f7;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      font-size: 15px;
    }

    .prize-history.top {
      color: #e03131;
      font-weight: 600;
    }

    .prize-history.third {
      color: #f5a623;
      font-weight: 600;
    }

    .prize-history.prize {
      color: #0066cc;
    }

    .prize-history.none {
      color: #868e96;
    }

    .prize-history.historical {
      color: #1d1d1f;
      font-weight: 600;
    }

    .chart-panel {
      display: grid;
      gap: 18px;
      max-width: 100%;
    }

    .chart {
      display: grid;
      grid-template-columns: repeat(45, minmax(0, 1fr));
      align-items: end;
      gap: 2px;
      min-height: 220px;
      padding-top: 8px;
      overflow: visible;
    }

    .bar-item {
      display: grid;
      grid-template-rows: 1fr auto;
      align-items: end;
      gap: 6px;
      min-width: 0;
      height: 220px;
    }

    .bar {
      width: 100%;
      min-height: 2px;
      border-radius: 8px 8px 0 0;
      background: var(--ball-yellow);
    }

    .bar-item:nth-child(n + 11):nth-child(-n + 20) .bar {
      background: var(--ball-blue);
    }

    .bar-item:nth-child(n + 21):nth-child(-n + 30) .bar {
      background: var(--ball-red);
    }

    .bar-item:nth-child(n + 31):nth-child(-n + 40) .bar {
      background: var(--ball-gray);
    }

    .bar-item:nth-child(n + 41):nth-child(-n + 45) .bar {
      background: var(--ball-green);
    }

    .bar-label {
      color: var(--color-muted);
      font-size: 10px;
      line-height: 1;
      text-align: center;
    }

    .status {
      margin-bottom: 18px;
      border-radius: 18px;
      padding: 12px 14px;
      background: #ffffff;
      border: none;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      color: var(--color-muted);
      font-size: 14px;
    }

    .status.error {
      color: var(--color-error);
    }

    .empty {
      color: var(--color-muted);
      font-size: 15px;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .hero {
        padding: 40px 20px;
      }

      .app {
        padding: 20px 14px 40px;
      }

      h1 {
        font-size: 34px;
      }

      .panel {
        padding: 18px;
      }

      .balls {
        grid-template-columns: repeat(3, minmax(78px, 1fr));
      }
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 30px;
      }


      .balls {
        grid-template-columns: repeat(2, minmax(88px, 1fr));
      }

      .ball {
        width: 54px;
        height: 54px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1>🍀 Lotto Picker</h1>
    <p id="summary" class="summary">통계 기반 로또 번호 추천</p>
  </header>

  <main class="app">
    <section id="status" class="status" aria-live="polite">lotto_data.json을 읽고 있습니다.</section>

    <div class="layout" aria-live="polite">
      <section class="panel result" aria-labelledby="result-title">
        <div class="result-header">
          <div>
            <h2 id="result-title">추천 번호</h2>
            <p id="mode-label" class="mode-label">추천 방식을 선택하세요.</p>
          </div>
        </div>
        <div id="balls" class="balls">
          <p class="empty">버튼을 눌러 번호를 추천받으세요</p>
        </div>
        <div class="actions">
          <button id="frequency-button" class="button" type="button" disabled>빈도 기반 추천</button>
          <button id="overdue-button" class="button" type="button" disabled>비출현 기반 추천</button>
          <button id="history-first-button" class="button" type="button">역대 1등 번호</button>
          <button id="history-second-button" class="button" type="button">역대 2등 번호</button>
        </div>
        <div class="actions">
          <button id="fortune-button" class="button" type="button">오늘의 운세 🔮</button>
          <button id="birthday-button" class="button" type="button">생년월일 🎂</button>
        </div>
        <div id="birthday-panel" class="birthday-panel">
          <input id="birthday-input" type="date" aria-label="생년월일">
          <button id="birthday-confirm-button" class="button" type="button">확인</button>
        </div>
      </section>

      <section class="panel chart-panel" aria-labelledby="chart-title">
        <h2 id="chart-title">번호별 출현 빈도</h2>
        <div id="chart" class="chart"></div>
      </section>
    </div>
  </main>
  <script>
    const state = {
      rounds: [],
      stats: [],
    };

    const summary = document.querySelector('#summary');
    const statusBox = document.querySelector('#status');
    const balls = document.querySelector('#balls');
    const chart = document.querySelector('#chart');
    const modeLabel = document.querySelector('#mode-label');
    const frequencyButton = document.querySelector('#frequency-button');
    const overdueButton = document.querySelector('#overdue-button');
    const historyFirstButton = document.querySelector('#history-first-button');
    const historySecondButton = document.querySelector('#history-second-button');
    const fortuneButton = document.querySelector('#fortune-button');
    const birthdayButton = document.querySelector('#birthday-button');
    const birthdayPanel = document.querySelector('#birthday-panel');
    const birthdayInput = document.querySelector('#birthday-input');
    const birthdayConfirmButton = document.querySelector('#birthday-confirm-button');

    function getBallColor(number) {
      if (number <= 10) return 'yellow';
      if (number <= 20) return 'blue';
      if (number <= 30) return 'red';
      if (number <= 40) return 'gray';
      return 'green';
    }

    function normalizeRound(round) {
      return {
        drwNo: Number(round.drwNo),
        numbers: [
          Number(round.drwtNo1),
          Number(round.drwtNo2),
          Number(round.drwtNo3),
          Number(round.drwtNo4),
          Number(round.drwtNo5),
          Number(round.drwtNo6),
        ],
      };
    }

    function calculateStats(rounds) {
      const normalized = rounds.map(normalizeRound).sort((a, b) => a.drwNo - b.drwNo);
      const latestDraw = normalized.at(-1)?.drwNo ?? 0;
      const stats = Array.from({ length: 45 }, (_, index) => ({
        number: index + 1,
        frequency: 0,
        lastSeenDraw: 0,
        overdue: latestDraw,
      }));

      for (const round of normalized) {
        for (const number of round.numbers) {
          if (number < 1 || number > 45) continue;
          const item = stats[number - 1];
          item.frequency += 1;
          item.lastSeenDraw = Math.max(item.lastSeenDraw, round.drwNo);
        }
      }

      for (const item of stats) {
        item.overdue = item.lastSeenDraw === 0 ? latestDraw : latestDraw - item.lastSeenDraw;
      }

      return stats;
    }

    function pickWeighted(stats, weightKey) {
      const pool = stats.map((item) => ({
        ...item,
        weight: Math.max(1, item[weightKey]),
      }));
      const picked = [];

      while (picked.length < 6 && pool.length > 0) {
        const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
        let target = Math.random() * totalWeight;
        const selectedIndex = pool.findIndex((item) => {
          target -= item.weight;
          return target <= 0;
        });
        const safeIndex = selectedIndex === -1 ? pool.length - 1 : selectedIndex;
        picked.push(pool.splice(safeIndex, 1)[0]);
      }

      return picked.sort((a, b) => a.number - b.number);
    }

    function renderBalls(selected, mode) {
      const metricLabel = mode === 'frequency' ? '출현' : '경과';
      const metricKey = mode === 'frequency' ? 'frequency' : 'overdue';
      balls.innerHTML = selected.map((item) => `
        <div class="ball-wrap">
          <div class="ball ${getBallColor(item.number)}">${item.number}</div>
          <div class="metric">${metricLabel} ${item[metricKey]}회</div>
        </div>
      `).join('');
    }

    function setButtonsDisabled(disabled) {
      frequencyButton.disabled = disabled;
      overdueButton.disabled = disabled;
    }

    function randomLottoNumber() {
      return Math.floor(Math.random() * 45) + 1;
    }

    function getRoundNumbers(round) {
      return [
        Number(round.drwtNo1),
        Number(round.drwtNo2),
        Number(round.drwtNo3),
        Number(round.drwtNo4),
        Number(round.drwtNo5),
        Number(round.drwtNo6),
      ];
    }

    function getPrizeRank(matchCount, bonusMatched) {
      if (matchCount === 6) return 1;
      if (matchCount === 5 && bonusMatched) return 2;
      if (matchCount === 5) return 3;
      if (matchCount === 4) return 4;
      if (matchCount === 3) return 5;
      return null;
    }

    function findBestPrizeHistory(selected) {
      const selectedNumbers = new Set(selected.map((item) => item.number));
      let best = null;

      for (const round of state.rounds) {
        const roundNumbers = getRoundNumbers(round);
        const matchCount = roundNumbers.filter((number) => selectedNumbers.has(number)).length;
        const bonusMatched = selectedNumbers.has(Number(round.bnusNo));
        const rank = getPrizeRank(matchCount, bonusMatched);

        if (rank && (!best || rank < best.rank)) {
          best = {
            rank,
            drwNo: round.drwNo,
            drwNoDate: round.drwNoDate,
          };
        }
      }

      return best;
    }

    function renderPrizeHistory(selected) {
      const best = findBestPrizeHistory(selected);
      const history = document.createElement('div');
      history.className = 'prize-history none';

      if (!best) {
        history.textContent = '이 조합은 역대 당첨 이력이 없습니다';
        balls.appendChild(history);
        return;
      }

      const detail = `(${best.drwNo}회차)`;
      if (best.rank <= 3) {
        history.textContent = `🏆 역대 최고 ${best.rank}등 당첨 이력! ${detail}`;
        history.className = `prize-history ${best.rank <= 2 ? 'top' : 'third'}`;
      } else {
        history.textContent = `✨ 역대 최고 ${best.rank}등 당첨 이력 ${detail}`;
        history.className = 'prize-history prize';
      }

      balls.appendChild(history);
    }

    function animateRecommendation(selected, mode, options = {}) {
      setButtonsDisabled(true);

      const metricLabel = mode === 'frequency' ? '출현' : '경과';
      const metricKey = mode === 'frequency' ? 'frequency' : 'overdue';
      const showMetrics = options.showMetrics !== false;
      balls.innerHTML = Array.from({ length: 6 }, () => `
        <div class="ball-wrap">
          <div class="ball pending">${randomLottoNumber()}</div>
          <div class="metric">&nbsp;</div>
        </div>
      `).join('');

      const ballElements = Array.from(balls.querySelectorAll('.ball'));
      const metricElements = Array.from(balls.querySelectorAll('.metric'));
      const intervals = ballElements.map((ball) => setInterval(() => {
        ball.textContent = randomLottoNumber();
      }, 50));

      selected.forEach((item, index) => {
        setTimeout(() => {
          clearInterval(intervals[index]);
          const ball = ballElements[index];
          ball.textContent = item.number;
          ball.className = `ball ${getBallColor(item.number)} bounce`;
          metricElements[index].textContent = showMetrics ? `${metricLabel} ${item[metricKey]}회` : '';

          setTimeout(() => {
            ball.classList.remove('bounce');
            if (index === selected.length - 1) {
              if (options.onComplete) {
                options.onComplete();
              } else {
                renderPrizeHistory(selected);
              }
              setButtonsDisabled(false);
            }
          }, 200);
        }, (index + 1) * 400);
      });
    }

    function renderChart(stats) {
      const maxFrequency = Math.max(...stats.map((item) => item.frequency), 1);
      chart.innerHTML = stats.map((item) => {
        const height = Math.max(2, Math.round((item.frequency / maxFrequency) * 180));
        return `
          <div class="bar-item" title="${item.number}번 ${item.frequency}회">
            <div class="bar" style="height: ${height}px"></div>
            <div class="bar-label">${item.number}</div>
          </div>
        `;
      }).join('');
    }

    function recommendByFrequency() {
      const selected = pickWeighted(state.stats, 'frequency');
      modeLabel.textContent = '출현 횟수가 높은 번호에 더 높은 가중치를 적용했습니다.';
      animateRecommendation(selected, 'frequency');
    }

    function recommendByOverdue() {
      const selected = pickWeighted(state.stats, 'overdue');
      modeLabel.textContent = '오랫동안 나오지 않은 번호에 더 높은 가중치를 적용했습니다.';
      animateRecommendation(selected, 'overdue');
    }

    function getRandomRound() {
      return state.rounds[Math.floor(Math.random() * state.rounds.length)];
    }

    function renderHistoricalLabel(text) {
      const label = document.createElement('div');
      label.className = 'prize-history historical';
      label.textContent = text;
      balls.appendChild(label);
    }

    function recommendHistoricalFirstPrize() {
      const round = getRandomRound();
      const selected = getRoundNumbers(round).map((number) => ({ number }));
      modeLabel.textContent = '랜덤으로 선택한 역대 1등 당첨 번호입니다.';
      animateRecommendation(selected, 'historical', {
        showMetrics: false,
        onComplete: () => renderHistoricalLabel(`${round.drwNo}회차 1등 당첨 번호`),
      });
    }

    function recommendHistoricalSecondPrize() {
      const round = getRandomRound();
      const selected = [
        Number(round.drwtNo1),
        Number(round.drwtNo2),
        Number(round.drwtNo3),
        Number(round.drwtNo4),
        Number(round.drwtNo5),
        Number(round.bnusNo),
      ].map((number) => ({ number }));
      modeLabel.textContent = '랜덤으로 선택한 역대 2등 당첨 번호입니다.';
      animateRecommendation(selected, 'historical', {
        showMetrics: false,
        onComplete: () => renderHistoricalLabel(`${round.drwNo}회차 2등 당첨 번호 (보너스: ${round.bnusNo})`),
      });
    }

    function toLottoNumber(value) {
      const normalized = value % 45;
      return normalized === 0 ? 45 : normalized;
    }

    function pickUniqueWeighted(numbers) {
      const pool = numbers.map((item) => ({ ...item }));
      const picked = [];

      while (picked.length < 6 && pool.length > 0) {
        const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
        let target = Math.random() * totalWeight;
        const index = pool.findIndex((item) => {
          target -= item.weight;
          return target <= 0;
        });
        const safeIndex = index === -1 ? pool.length - 1 : index;
        picked.push(pool.splice(safeIndex, 1)[0]);
      }

      return picked.sort((a, b) => a.number - b.number);
    }

    function getFortuneEnergy(month) {
      if (month <= 2) return { element: '목(木)', ranges: [[1, 9], [10, 18]] };
      if (month <= 4) return { element: '화(火)', ranges: [[10, 18], [19, 27]] };
      if (month <= 6) return { element: '토(土)', ranges: [[19, 27]] };
      if (month <= 8) return { element: '금(金)', ranges: [[28, 36]] };
      if (month <= 10) return { element: '수(水)', ranges: [[37, 45]] };
      return { element: '목(木)', ranges: [[1, 9]] };
    }

    function recommendFortune() {
      const today = new Date();
      const month = today.getMonth() + 1;
      const day = today.getDate();
      const energy = getFortuneEnergy(month);
      const yinYang = day % 2 === 1 ? '양(陽)' : '음(陰)';
      const weighted = Array.from({ length: 45 }, (_, index) => {
        const number = index + 1;
        const boosted = energy.ranges.some(([start, end]) => number >= start && number <= end);
        return { number, weight: boosted ? 3 : 1 };
      });
      const selected = pickUniqueWeighted(weighted);

      modeLabel.textContent = `${month}월 ${day}일의 기운으로 뽑은 번호입니다.`;
      animateRecommendation(selected, 'fortune', {
        showMetrics: false,
        onComplete: () => {
          renderPrizeHistory(selected);
          renderHistoricalLabel(`오늘의 기운: ${month}월 ${day}일 · ${energy.element} · ${yinYang}`);
        },
      });
    }

    function getBirthdayNumbers(value) {
      const digits = value.replaceAll('-', '');
      const year = Number(digits.slice(0, 4));
      const month = Number(digits.slice(4, 6));
      const day = Number(digits.slice(6, 8));
      const digitList = digits.split('').map(Number);
      const digitSum = digitList.reduce((sum, number) => sum + number, 0);
      const oddPositionSum = digitList.reduce((sum, number, index) => index % 2 === 0 ? sum + number : sum, 0);
      const candidates = [
        toLottoNumber(digitSum),
        toLottoNumber(year),
        toLottoNumber(month),
        toLottoNumber(day),
        toLottoNumber(digitSum),
        toLottoNumber(oddPositionSum),
      ];
      const unique = [...new Set(candidates)];

      while (unique.length < 6) {
        const next = randomLottoNumber();
        if (!unique.includes(next)) {
          unique.push(next);
        }
      }

      return unique.slice(0, 6).sort((a, b) => a - b).map((number) => ({ number }));
    }

    function toggleBirthdayInput() {
      birthdayPanel.classList.toggle('open');
      if (birthdayPanel.classList.contains('open')) {
        birthdayInput.focus();
      }
    }

    function recommendBirthday() {
      if (!birthdayInput.value) {
        modeLabel.textContent = '생년월일을 입력해주세요';
        return;
      }

      const selected = getBirthdayNumbers(birthdayInput.value);
      const [year, month, day] = birthdayInput.value.split('-');
      modeLabel.textContent = `${year}년 ${month}월 ${day}일 기준 개인 번호입니다.`;
      animateRecommendation(selected, 'birthday', {
        showMetrics: false,
        onComplete: () => {
          renderPrizeHistory(selected);
          renderHistoricalLabel(`${year}년 ${month}월 ${day}일 기준 개인 번호`);
        },
      });
    }

    function setError(message) {
      statusBox.textContent = message;
      statusBox.classList.add('error');
      summary.textContent = '데이터를 불러오지 못했습니다.';
    }

    async function loadData() {
      try {
        const response = await fetch('lotto_data.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`lotto_data.json 요청 실패 (${response.status})`);
        }

        const data = await response.json();
        if (!Array.isArray(data) || data.length === 0) {
          throw new Error('lotto_data.json에 회차 데이터가 없습니다.');
        }

        state.rounds = data.slice().sort((a, b) => Number(a.drwNo) - Number(b.drwNo));
        state.stats = calculateStats(state.rounds);

        const latestDraw = state.rounds.at(-1)?.drwNo;
        summary.textContent = `총 ${state.rounds.length}회차 데이터 기준`;
        statusBox.textContent = `최신 ${latestDraw}회차까지 반영했습니다.`;
        renderChart(state.stats);
        frequencyButton.disabled = false;
        overdueButton.disabled = false;
      } catch (error) {
        setError(error.message);
      }
    }

    frequencyButton.addEventListener('click', recommendByFrequency);
    overdueButton.addEventListener('click', recommendByOverdue);
    historyFirstButton.addEventListener('click', recommendHistoricalFirstPrize);
    historySecondButton.addEventListener('click', recommendHistoricalSecondPrize);
    fortuneButton.addEventListener('click', recommendFortune);
    birthdayButton.addEventListener('click', toggleBirthdayInput);
    birthdayConfirmButton.addEventListener('click', recommendBirthday);

    loadData();
  </script>
</body>
</html>

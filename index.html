<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lotto Picker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <script src="https://cdn.jsdelivr.net/npm/korean-lunar-calendar/dist/korean-lunar-calendar.min.js"></script>
  <style>
    :root {
      --color-primary: #0066cc;
      --color-ink: #1d1d1f;
      --color-canvas: #ffffff;
      --color-canvas-parchment: #f5f5f7;
      --color-muted: #6e6e73;
      --color-error: #b00020;
      --radius-pill: 980px;
      --radius-utility: 8px;
      --radius-card: 18px;
      --font-body: 'Pretendard', -apple-system, sans-serif;
      --ball-yellow: #f5a623;
      --ball-blue: #0066cc;
      --ball-red: #e03131;
      --ball-gray: #868e96;
      --ball-green: #2f9e44;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f5f7;
      color: var(--color-ink);
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 17px;
      line-height: 1.47;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .hero {
      display: grid;
      justify-items: center;
      gap: 10px;
      padding: 48px 24px;
      background: #1d1d1f;
      text-align: center;
    }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #ffffff;
      font-size: 40px;
      line-height: 1.1;
      font-weight: 600;
      letter-spacing: 0;
      text-align: center;
    }

    h2 {
      font-size: 24px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: 0;
    }

    .summary {
      color: rgba(255, 255, 255, 0.6);
      font-size: 17px;
    }

    .panel {
      background: #ffffff;
      border: none;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }

    .actions {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      margin-top: 20px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      padding: 8px 6px;
      background: #0066cc;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      flex: 1 1 0;
      min-width: 0;
      width: auto;
      text-align: center;
      cursor: pointer;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.18), 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: transform 110ms ease, opacity 120ms ease, box-shadow 110ms ease, filter 120ms ease;
    }

    .button:hover {
      opacity: 0.92;
      filter: brightness(1.04);
    }

    .button:active {
      transform: translateY(3px) scale(0.94);
      box-shadow: inset 0 2px 0 rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    .button:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
    }


    #frequency-button {
      background: #0066cc;
      color: #ffffff;
    }

    #overdue-button {
      background: #2f9e44;
      color: #ffffff;
    }

    #history-first-button {
      background: #1d1d1f;
      color: #ffffff;
    }

    #history-second-button {
      background: #868e96;
      color: #ffffff;
    }

    #fortune-button {
      background: #6741d9;
      color: #ffffff;
    }

    #saju-button {
      background: #e03131;
      color: #ffffff;
    }

    .saju-panel {
      display: none;
      grid-template-columns: auto minmax(56px, 0.65fr) minmax(44px, 0.38fr) minmax(44px, 0.38fr) minmax(140px, 1.15fr) auto auto auto;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #e5e5ea;
    }

    .saju-panel.open {
      display: grid;
    }

    .saju-panel input,
    .saju-panel select {
      min-width: 0;
      border: 1px solid #d0d0d5;
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 13px;
      background: #ffffff;
    }

    .calendar-radio {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .calendar-radio input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .calendar-radio label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      padding: 8px 10px;
      background: #f0f0f0;
      color: #666666;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 110ms ease, opacity 120ms ease;
    }

    .calendar-radio input:checked + label {
      background: #6741d9;
      color: #ffffff;
    }

    .calendar-radio label:active {
      transform: scale(0.97);
    }

    .saju-panel .button {
      aspect-ratio: auto;
      min-height: 42px;
      padding: 10px 18px;
      background: #e03131;
      border-radius: 12px;
    }

    .saju-mode-toggle {
      display: flex;
      gap: 8px;
    }

    .saju-mode-button {
      border: 0;
      border-radius: 10px;
      padding: 8px 10px;
      background: #f0f0f0;
      color: #666666;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 110ms ease, opacity 120ms ease;
    }

    .saju-mode-button.active {
      background: #6741d9;
      color: #ffffff;
    }

    .saju-mode-button:active {
      transform: scale(0.97);
    }

    .result {
      display: grid;
      gap: 18px;
    }

    .result-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }

    .mode-label {
      color: var(--color-muted);
      font-size: 14px;
    }

    .balls {
      display: grid;
      grid-template-columns: repeat(6, minmax(72px, 1fr));
      gap: 14px;
    }

    .ball-wrap {
      display: grid;
      justify-items: center;
      gap: 8px;
      min-width: 0;
    }

    .ball {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      color: #ffffff;
      font-size: 21px;
      font-weight: 600;
      line-height: 1;
      border: 1px solid rgba(0, 0, 0, 0.08);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .ball.yellow {
      background: var(--ball-yellow);
      color: var(--color-ink);
      text-shadow: none;
    }

    .ball.blue {
      background: var(--ball-blue);
    }

    .ball.red {
      background: var(--ball-red);
    }

    .ball.gray {
      background: var(--ball-gray);
    }

    .ball.green {
      background: var(--ball-green);
    }

    .ball.pending {
      background: #cccccc;
      color: #ffffff;
      text-shadow: none;
    }

    .ball.bounce {
      animation: ball-bounce 200ms ease-out;
    }

    @keyframes ball-bounce {
      0% {
        transform: scale(1.3);
      }

      100% {
        transform: scale(1);
      }
    }

    .metric {
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.3;
      text-align: center;
      word-break: keep-all;
    }

    .prize-history {
      grid-column: 1 / -1;
      background: #f5f5f7;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      font-size: 15px;
    }

    .prize-history.top {
      background: linear-gradient(135deg, #fff3cd, #ffd700);
      border: 2px solid #ffd700;
      color: #e03131;
      font-size: 18px;
      font-weight: 700;
      animation: pulse 1s ease-in-out 3;
    }

    .prize-history.third {
      background: #fff8e1;
      border: 2px solid #f5a623;
      color: #f5a623;
      font-size: 16px;
      font-weight: 600;
    }

    .prize-history.prize {
      color: #0066cc;
      font-size: 14px;
    }

    .prize-history.none {
      color: #aaaaaa;
      font-size: 13px;
      padding: 8px 12px;
    }

    .prize-history.historical {
      color: #1d1d1f;
      font-weight: 600;
    }

    .prize-history.basis {
      color: #1d1d1f;
      font-weight: 600;
    }

    .saju-guide {
      grid-column: 1 / -1;
      background: #f3f0ff;
      border-left: 4px solid #6741d9;
      border-radius: 10px;
      padding: 12px 16px;
      color: #3d2a8a;
      font-size: 14px;
      text-align: center;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.03);
      }
    }

    .chart-panel {
      display: grid;
      gap: 18px;
      max-width: 100%;
    }

    .chart {
      display: grid;
      grid-template-columns: repeat(45, minmax(0, 1fr));
      align-items: end;
      gap: 2px;
      min-height: 220px;
      padding-top: 8px;
      overflow: visible;
    }

    .bar-item {
      display: grid;
      grid-template-rows: 1fr auto;
      align-items: end;
      gap: 6px;
      min-width: 0;
      height: 220px;
    }

    .bar {
      width: 100%;
      min-height: 2px;
      border-radius: 8px 8px 0 0;
      background: var(--ball-yellow);
    }

    .bar-item:nth-child(n + 11):nth-child(-n + 20) .bar {
      background: var(--ball-blue);
    }

    .bar-item:nth-child(n + 21):nth-child(-n + 30) .bar {
      background: var(--ball-red);
    }

    .bar-item:nth-child(n + 31):nth-child(-n + 40) .bar {
      background: var(--ball-gray);
    }

    .bar-item:nth-child(n + 41):nth-child(-n + 45) .bar {
      background: var(--ball-green);
    }

    .bar-label {
      color: var(--color-muted);
      font-size: 10px;
      line-height: 1;
      text-align: center;
    }

    .status {
      margin-bottom: 18px;
      border-radius: 18px;
      padding: 12px 14px;
      background: #ffffff;
      border: none;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      color: var(--color-muted);
      font-size: 14px;
    }

    .status.error {
      color: var(--color-error);
    }

    .empty {
      color: var(--color-muted);
      font-size: 15px;
      white-space: nowrap;
    }

    @media (max-width: 720px) {
      .hero {
        padding: 40px 20px;
      }

      .app {
        padding: 20px 14px 40px;
      }

      h1 {
        font-size: 34px;
      }

      .panel {
        padding: 18px;
      }

      .balls {
        grid-template-columns: repeat(3, minmax(78px, 1fr));
      }
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 30px;
      }


      .balls {
        grid-template-columns: repeat(2, minmax(88px, 1fr));
      }

      .ball {
        width: 54px;
        height: 54px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .hero {
        padding: 32px 16px;
      }

      h1 {
        font-size: 28px;
      }

      .app {
        padding: 12px;
      }

      .actions {
        flex-wrap: wrap;
      }

      .actions .button {
        flex: 1 1 calc(50% - 4px);
        max-width: calc(50% - 4px);
        padding: 10px 8px;
        font-size: 13px;
      }

      .saju-panel.open {
        display: flex;
        flex-wrap: wrap;
      }

      .calendar-radio {
        width: 100%;
      }

      .calendar-radio label {
        flex: 1;
      }

      #saju-year-input,
      #saju-month-input,
      #saju-day-input {
        flex: 1;
        min-width: 60px;
      }

      #saju-time-select {
        width: 100%;
        flex: 1 1 100%;
      }

      .saju-mode-toggle,
      .saju-panel .button {
        flex: 1;
      }

      .ball {
        width: 44px;
        height: 44px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <h1>Lotto Picker</h1>
    <p id="summary" class="summary">로또도 사는 놈이 된다!</p>
  </header>

  <main class="app">
    <section id="status" class="status" aria-live="polite">lotto_data.json을 읽고 있습니다.</section>

    <div class="layout" aria-live="polite">
      <section class="panel result" aria-labelledby="result-title">
        <div class="result-header">
          <div>
            <h2 id="result-title">추천 번호</h2>
            <p id="mode-label" class="mode-label">추천 방식을 선택하세요.</p>
          </div>
        </div>
        <div id="balls" class="balls">
          <p class="empty">버튼을 눌러 번호를 추천받으세요</p>
        </div>
        <div class="actions">
          <button id="frequency-button" class="button" type="button" disabled>빈도</button>
          <button id="overdue-button" class="button" type="button" disabled>비출현</button>
          <button id="history-first-button" class="button" type="button">역대1등</button>
          <button id="history-second-button" class="button" type="button">역대2등</button>
          <button id="fortune-button" class="button" type="button">음양오행</button>
          <button id="saju-button" class="button" type="button">사주</button>
        </div>
        <div id="saju-panel" class="saju-panel">
          <div class="calendar-radio" aria-label="양력 음력 선택">
            <input id="calendar-solar" name="calendar-mode" type="radio" value="solar" checked>
            <label for="calendar-solar">양력</label>
            <input id="calendar-lunar" name="calendar-mode" type="radio" value="lunar">
            <label for="calendar-lunar">음력</label>
          </div>
          <input id="saju-year-input" type="text" inputmode="numeric" maxlength="4" placeholder="YYYY" aria-label="생년">
          <input id="saju-month-input" type="text" inputmode="numeric" maxlength="2" placeholder="MM" aria-label="생월">
          <input id="saju-day-input" type="text" inputmode="numeric" maxlength="2" placeholder="DD" aria-label="생일">
          <select id="saju-time-select" aria-label="태어난 시">
            <option value="자">자시(23~01시)</option>
            <option value="축">축시(01~03시)</option>
            <option value="인">인시(03~05시)</option>
            <option value="묘">묘시(05~07시)</option>
            <option value="진">진시(07~09시)</option>
            <option value="사">사시(09~11시)</option>
            <option value="오">오시(11~13시)</option>
            <option value="미">미시(13~15시)</option>
            <option value="신">신시(15~17시)</option>
            <option value="유">유시(17~19시)</option>
            <option value="술">술시(19~21시)</option>
            <option value="해">해시(21~23시)</option>
          </select>
          <div class="saju-mode-toggle" aria-label="사주 추천 모드">
            <button id="saju-boost-mode" class="saju-mode-button active" type="button">기운 강화</button>
            <button id="saju-balance-mode" class="saju-mode-button" type="button">기운 조화</button>
          </div>
          <button id="saju-confirm-button" class="button" type="button">확인</button>
        </div>
      </section>

      <section class="panel chart-panel" aria-labelledby="chart-title">
        <h2 id="chart-title">번호별 출현 빈도</h2>
        <div id="chart" class="chart"></div>
      </section>
    </div>
  </main>
  <script>
    const state = {
      rounds: [],
      stats: [],
    };

    const summary = document.querySelector('#summary');
    const statusBox = document.querySelector('#status');
    const balls = document.querySelector('#balls');
    const chart = document.querySelector('#chart');
    const modeLabel = document.querySelector('#mode-label');
    const frequencyButton = document.querySelector('#frequency-button');
    const overdueButton = document.querySelector('#overdue-button');
    const historyFirstButton = document.querySelector('#history-first-button');
    const historySecondButton = document.querySelector('#history-second-button');
    const fortuneButton = document.querySelector('#fortune-button');
    const sajuButton = document.querySelector('#saju-button');
    const sajuPanel = document.querySelector('#saju-panel');
    const sajuYearInput = document.querySelector('#saju-year-input');
    const sajuMonthInput = document.querySelector('#saju-month-input');
    const sajuDayInput = document.querySelector('#saju-day-input');
    const sajuTimeSelect = document.querySelector('#saju-time-select');
    const sajuConfirmButton = document.querySelector('#saju-confirm-button');
    const sajuBoostModeButton = document.querySelector('#saju-boost-mode');
    const sajuBalanceModeButton = document.querySelector('#saju-balance-mode');
    const calendarModeInputs = Array.from(document.querySelectorAll('input[name="calendar-mode"]'));
    let sajuMode = 'boost';
    let calendarMode = 'solar';

    function getBallColor(number) {
      if (number <= 10) return 'yellow';
      if (number <= 20) return 'blue';
      if (number <= 30) return 'red';
      if (number <= 40) return 'gray';
      return 'green';
    }

    function normalizeRound(round) {
      return {
        drwNo: Number(round.drwNo),
        numbers: [
          Number(round.drwtNo1),
          Number(round.drwtNo2),
          Number(round.drwtNo3),
          Number(round.drwtNo4),
          Number(round.drwtNo5),
          Number(round.drwtNo6),
        ],
      };
    }

    function calculateStats(rounds) {
      const normalized = rounds.map(normalizeRound).sort((a, b) => a.drwNo - b.drwNo);
      const latestDraw = normalized.at(-1)?.drwNo ?? 0;
      const stats = Array.from({ length: 45 }, (_, index) => ({
        number: index + 1,
        frequency: 0,
        lastSeenDraw: 0,
        overdue: latestDraw,
      }));

      for (const round of normalized) {
        for (const number of round.numbers) {
          if (number < 1 || number > 45) continue;
          const item = stats[number - 1];
          item.frequency += 1;
          item.lastSeenDraw = Math.max(item.lastSeenDraw, round.drwNo);
        }
      }

      for (const item of stats) {
        item.overdue = item.lastSeenDraw === 0 ? latestDraw : latestDraw - item.lastSeenDraw;
      }

      return stats;
    }

    function pickWeighted(stats, weightKey) {
      const pool = stats.map((item) => ({
        ...item,
        weight: Math.max(1, item[weightKey]),
      }));
      const picked = [];

      while (picked.length < 6 && pool.length > 0) {
        const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
        let target = Math.random() * totalWeight;
        const selectedIndex = pool.findIndex((item) => {
          target -= item.weight;
          return target <= 0;
        });
        const safeIndex = selectedIndex === -1 ? pool.length - 1 : selectedIndex;
        picked.push(pool.splice(safeIndex, 1)[0]);
      }

      return picked.sort((a, b) => a.number - b.number);
    }

    function passesRecommendFilter(selected) {
      const oddCount = selected.filter((item) => item.number % 2 === 1).length;
      const total = selected.reduce((sum, item) => sum + item.number, 0);
      return oddCount !== 0 && oddCount !== 6 && total >= 100 && total <= 170;
    }

    function pickFilteredWeighted(stats, weightKey) {
      let selected = pickWeighted(stats, weightKey);
      for (let attempt = 0; attempt < 100; attempt += 1) {
        if (passesRecommendFilter(selected)) {
          return selected;
        }
        selected = pickWeighted(stats, weightKey);
      }
      return selected;
    }

    function renderBalls(selected, mode) {
      const metricLabel = mode === 'frequency' ? '출현' : '경과';
      const metricKey = mode === 'frequency' ? 'frequency' : 'overdue';
      balls.innerHTML = selected.map((item) => `
        <div class="ball-wrap">
          <div class="ball ${getBallColor(item.number)}">${item.number}</div>
          <div class="metric">${metricLabel} ${item[metricKey]}회</div>
        </div>
      `).join('');
    }

    function setButtonsDisabled(disabled) {
      frequencyButton.disabled = disabled;
      overdueButton.disabled = disabled;
    }

    function randomLottoNumber() {
      return Math.floor(Math.random() * 45) + 1;
    }

    function getRoundNumbers(round) {
      return [
        Number(round.drwtNo1),
        Number(round.drwtNo2),
        Number(round.drwtNo3),
        Number(round.drwtNo4),
        Number(round.drwtNo5),
        Number(round.drwtNo6),
      ];
    }

    function getPrizeRank(matchCount, bonusMatched) {
      if (matchCount === 6) return 1;
      if (matchCount === 5 && bonusMatched) return 2;
      if (matchCount === 5) return 3;
      if (matchCount === 4) return 4;
      if (matchCount === 3) return 5;
      return null;
    }

    function findBestPrizeHistory(selected) {
      const selectedNumbers = new Set(selected.map((item) => item.number));
      let best = null;

      for (const round of state.rounds) {
        const roundNumbers = getRoundNumbers(round);
        const matchCount = roundNumbers.filter((number) => selectedNumbers.has(number)).length;
        const bonusMatched = selectedNumbers.has(Number(round.bnusNo));
        const rank = getPrizeRank(matchCount, bonusMatched);

        if (rank && (!best || rank < best.rank)) {
          best = {
            rank,
            drwNo: round.drwNo,
            drwNoDate: round.drwNoDate,
          };
        }
      }

      return best;
    }

    function renderPrizeHistory(selected) {
      const best = findBestPrizeHistory(selected);
      const history = document.createElement('div');
      history.className = 'prize-history none';

      if (!best) {
        history.textContent = '이 조합은 역대 당첨 이력이 없습니다';
        balls.appendChild(history);
        return;
      }

      const detail = `(${best.drwNo}회차)`;
      if (best.rank <= 3) {
        const prefix = best.rank <= 2 ? '🎊 🏆' : '🏆';
        history.textContent = `${prefix} 역대 최고 ${best.rank}등 당첨 이력! ${detail}`;
        history.className = `prize-history ${best.rank <= 2 ? 'top' : 'third'}`;
      } else {
        history.textContent = `✨ 역대 최고 ${best.rank}등 당첨 이력 ${detail}`;
        history.className = 'prize-history prize';
      }

      balls.appendChild(history);
    }

    function animateRecommendation(selected, mode, options = {}) {
      setButtonsDisabled(true);

      const metricLabel = mode === 'frequency' ? '출현' : '경과';
      const metricKey = mode === 'frequency' ? 'frequency' : 'overdue';
      const showMetrics = options.showMetrics !== false;
      balls.innerHTML = Array.from({ length: 6 }, () => `
        <div class="ball-wrap">
          <div class="ball pending">${randomLottoNumber()}</div>
          <div class="metric">&nbsp;</div>
        </div>
      `).join('');

      const ballElements = Array.from(balls.querySelectorAll('.ball'));
      const metricElements = Array.from(balls.querySelectorAll('.metric'));
      const intervals = ballElements.map((ball) => setInterval(() => {
        ball.textContent = randomLottoNumber();
      }, 50));

      selected.forEach((item, index) => {
        setTimeout(() => {
          clearInterval(intervals[index]);
          const ball = ballElements[index];
          ball.textContent = item.number;
          ball.className = `ball ${getBallColor(item.number)} bounce`;
          metricElements[index].textContent = showMetrics ? `${metricLabel} ${item[metricKey]}회` : '';

          setTimeout(() => {
            ball.classList.remove('bounce');
            if (index === selected.length - 1) {
              if (options.onComplete) {
                options.onComplete();
              } else {
                renderPrizeHistory(selected);
              }
              setButtonsDisabled(false);
            }
          }, 200);
        }, (index + 1) * 400);
      });
    }

    function renderChart(stats) {
      const maxFrequency = Math.max(...stats.map((item) => item.frequency), 1);
      chart.innerHTML = stats.map((item) => {
        const height = Math.max(2, Math.round((item.frequency / maxFrequency) * 180));
        return `
          <div class="bar-item" title="${item.number}번 ${item.frequency}회">
            <div class="bar" style="height: ${height}px"></div>
            <div class="bar-label">${item.number}</div>
          </div>
        `;
      }).join('');
    }

    function hideSajuInput() {
      sajuPanel.classList.remove('open');
    }

    function recommendByFrequency() {
      hideSajuInput();
      const selected = pickFilteredWeighted(state.stats, 'frequency');
      modeLabel.textContent = '출현 횟수가 높은 번호에 더 높은 가중치를 적용했습니다.';
      animateRecommendation(selected, 'frequency');
    }

    function recommendByOverdue() {
      hideSajuInput();
      const selected = pickFilteredWeighted(state.stats, 'overdue');
      modeLabel.textContent = '오랫동안 나오지 않은 번호에 더 높은 가중치를 적용했습니다.';
      animateRecommendation(selected, 'overdue');
    }

    function getRandomRound() {
      return state.rounds[Math.floor(Math.random() * state.rounds.length)];
    }

    function renderHistoricalLabel(text) {
      const label = document.createElement('div');
      label.className = 'prize-history historical';
      label.textContent = text;
      balls.appendChild(label);
    }

    function renderBasisLabel(text) {
      const label = document.createElement('div');
      label.className = 'prize-history basis';
      label.textContent = text;
      balls.appendChild(label);
    }

    function recommendHistoricalFirstPrize() {
      hideSajuInput();
      const round = getRandomRound();
      const selected = getRoundNumbers(round).map((number) => ({ number }));
      modeLabel.textContent = '랜덤으로 선택한 역대 1등 당첨 번호입니다.';
      animateRecommendation(selected, 'historical', {
        showMetrics: false,
        onComplete: () => renderHistoricalLabel(`${round.drwNo}회차 1등 당첨 번호`),
      });
    }

    function recommendHistoricalSecondPrize() {
      hideSajuInput();
      const round = getRandomRound();
      const selected = [
        Number(round.drwtNo1),
        Number(round.drwtNo2),
        Number(round.drwtNo3),
        Number(round.drwtNo4),
        Number(round.drwtNo5),
        Number(round.bnusNo),
      ].map((number) => ({ number }));
      modeLabel.textContent = '랜덤으로 선택한 역대 2등 당첨 번호입니다.';
      animateRecommendation(selected, 'historical', {
        showMetrics: false,
        onComplete: () => renderHistoricalLabel(`${round.drwNo}회차 2등 당첨 번호 (보너스: ${round.bnusNo})`),
      });
    }

    function toLottoNumber(value) {
      const normalized = value % 45;
      return normalized === 0 ? 45 : normalized;
    }

    function pickUniqueWeighted(numbers) {
      const pool = numbers.map((item) => ({ ...item }));
      const picked = [];

      while (picked.length < 6 && pool.length > 0) {
        const totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
        let target = Math.random() * totalWeight;
        const index = pool.findIndex((item) => {
          target -= item.weight;
          return target <= 0;
        });
        const safeIndex = index === -1 ? pool.length - 1 : index;
        picked.push(pool.splice(safeIndex, 1)[0]);
      }

      return picked.sort((a, b) => a.number - b.number);
    }

    function getFortuneEnergy(month) {
      if (month <= 2) return { element: '목(木)', ranges: [[1, 9], [10, 18]] };
      if (month <= 4) return { element: '화(火)', ranges: [[10, 18], [19, 27]] };
      if (month <= 6) return { element: '토(土)', ranges: [[19, 27]] };
      if (month <= 8) return { element: '금(金)', ranges: [[28, 36]] };
      if (month <= 10) return { element: '수(水)', ranges: [[37, 45]] };
      return { element: '목(木)', ranges: [[1, 9]] };
    }

    function recommendFortune() {
      hideSajuInput();
      const today = new Date();
      const month = today.getMonth() + 1;
      const day = today.getDate();
      const energy = getFortuneEnergy(month);
      const yinYang = day % 2 === 1 ? '양(陽)' : '음(陰)';
      const weighted = Array.from({ length: 45 }, (_, index) => {
        const number = index + 1;
        const boosted = energy.ranges.some(([start, end]) => number >= start && number <= end);
        return { number, weight: boosted ? 3 : 1 };
      });
      const selected = pickUniqueWeighted(weighted);

      modeLabel.textContent = `${month}월 ${day}일의 기운으로 뽑은 번호입니다.`;
      animateRecommendation(selected, 'fortune', {
        showMetrics: false,
        onComplete: () => {
          renderPrizeHistory(selected);
          renderHistoricalLabel(`오늘의 기운: ${month}월 ${day}일 · ${energy.element} · ${yinYang}`);
        },
      });
    }

    const heavenlyStems = [
      { hanja: '庚', element: '금' },
      { hanja: '辛', element: '금' },
      { hanja: '壬', element: '수' },
      { hanja: '癸', element: '수' },
      { hanja: '甲', element: '목' },
      { hanja: '乙', element: '목' },
      { hanja: '丙', element: '화' },
      { hanja: '丁', element: '화' },
      { hanja: '戊', element: '토' },
      { hanja: '己', element: '토' },
    ];
    const earthlyBranches = [
      { key: '자', hanja: '子', element: '수' },
      { key: '축', hanja: '丑', element: '토' },
      { key: '인', hanja: '寅', element: '목' },
      { key: '묘', hanja: '卯', element: '목' },
      { key: '진', hanja: '辰', element: '토' },
      { key: '사', hanja: '巳', element: '화' },
      { key: '오', hanja: '午', element: '화' },
      { key: '미', hanja: '未', element: '토' },
      { key: '신', hanja: '申', element: '금' },
      { key: '유', hanja: '酉', element: '금' },
      { key: '술', hanja: '戌', element: '토' },
      { key: '해', hanja: '亥', element: '수' },
    ];
    const monthBranches = {
      1: earthlyBranches[2],
      2: earthlyBranches[3],
      3: earthlyBranches[4],
      4: earthlyBranches[5],
      5: earthlyBranches[6],
      6: earthlyBranches[7],
      7: earthlyBranches[8],
      8: earthlyBranches[9],
      9: earthlyBranches[10],
      10: earthlyBranches[11],
      11: earthlyBranches[0],
      12: earthlyBranches[1],
    };
    const timeBranches = Object.fromEntries(earthlyBranches.map((branch) => [branch.key, branch]));
    const elementRanges = {
      목: [1, 9],
      화: [10, 18],
      토: [19, 27],
      금: [28, 36],
      수: [37, 45],
    };
    const elementHanja = {
      목: '木',
      화: '火',
      토: '土',
      금: '金',
      수: '水',
    };

    function getRandomFromElement(element, usedNumbers) {
      const [start, end] = elementRanges[element];
      const candidates = [];
      for (let number = start; number <= end; number += 1) {
        if (!usedNumbers.has(number)) {
          candidates.push(number);
        }
      }
      if (candidates.length === 0) {
        return null;
      }
      return candidates[Math.floor(Math.random() * candidates.length)];
    }

    function addElementNumber(numbers, usedNumbers, element) {
      const number = getRandomFromElement(element, usedNumbers);
      if (number) {
        usedNumbers.add(number);
        numbers.push(number);
      }
    }

    function getSajuTargetElement(counts, mode) {
      const entries = Object.keys(elementRanges).map((element) => [element, counts[element] || 0]);
      if (mode === 'balance') {
        return entries.sort((a, b) => a[1] - b[1])[0][0];
      }
      return entries.sort((a, b) => b[1] - a[1])[0][0];
    }

    function getSajuResult(yearStem, yearBranch, monthBranch, timeBranch, mode) {
      const elements = [yearStem.element, yearBranch.element, monthBranch.element, timeBranch.element];
      const counts = elements.reduce((acc, element) => {
        acc[element] = (acc[element] || 0) + 1;
        return acc;
      }, {});
      const targetElement = getSajuTargetElement(counts, mode);
      const numbers = [];
      const usedNumbers = new Set();

      for (const element of elements) {
        addElementNumber(numbers, usedNumbers, element);
      }
      addElementNumber(numbers, usedNumbers, targetElement);
      addElementNumber(numbers, usedNumbers, targetElement);

      while (numbers.length < 6) {
        const next = randomLottoNumber();
        if (!usedNumbers.has(next)) {
          usedNumbers.add(next);
          numbers.push(next);
        }
      }

      return {
        targetElement,
        selected: numbers.slice(0, 6).sort((a, b) => a - b).map((number) => ({ number })),
      };
    }

    function toggleSajuInput() {
      sajuPanel.classList.toggle('open');
      if (sajuPanel.classList.contains('open')) {
        sajuYearInput.focus();
      }
    }

    function setSajuMode(mode) {
      sajuMode = mode;
      sajuBoostModeButton.classList.toggle('active', mode === 'boost');
      sajuBalanceModeButton.classList.toggle('active', mode === 'balance');
    }

    function setCalendarMode(mode) {
      calendarMode = mode;
    }

    function onlyDigits(input) {
      input.value = input.value.replace(/\D/g, '');
    }

    function moveFocusWhenFilled(input, nextInput, length) {
      onlyDigits(input);
      if (input.value.length >= length) {
        nextInput.focus();
      }
    }

    function formatDateParts(year, month, day) {
      return `${year}.${String(month).padStart(2, '0')}.${String(day).padStart(2, '0')}`;
    }

    function getInputDateParts() {
      return {
        year: Number(sajuYearInput.value),
        month: Number(sajuMonthInput.value),
        day: Number(sajuDayInput.value),
      };
    }

    function hasCompleteSajuDate() {
      return sajuYearInput.value.length === 4 && sajuMonthInput.value.length >= 1 && sajuDayInput.value.length >= 1;
    }

    function getLunarDateFromSolar(year, month, day) {
      if (typeof KoreanLunarCalendar === 'undefined') {
        throw new Error('음력 변환 라이브러리를 불러오지 못했습니다.');
      }

      const calendar = new KoreanLunarCalendar();
      if (!calendar.setSolarDate(year, month, day)) {
        throw new Error('양력 날짜를 음력으로 변환할 수 없습니다.');
      }

      const lunar = calendar.getLunarCalendar();
      return {
        year: Number(lunar.lunarYear ?? lunar.year),
        month: Number(lunar.lunarMonth ?? lunar.month),
        day: Number(lunar.lunarDay ?? lunar.day),
      };
    }

    function getSajuBaseDate() {
      const inputDate = getInputDateParts();

      if (calendarMode === 'lunar') {
        return {
          ...inputDate,
          label: `음력 ${formatDateParts(inputDate.year, inputDate.month, inputDate.day)} 기준`,
        };
      }

      const lunarDate = getLunarDateFromSolar(inputDate.year, inputDate.month, inputDate.day);
      return {
        ...lunarDate,
        label: `양력 ${formatDateParts(inputDate.year, inputDate.month, inputDate.day)} → 음력 ${formatDateParts(lunarDate.year, lunarDate.month, lunarDate.day)} 기준`,
      };
    }

    function recommendSaju() {
      if (!hasCompleteSajuDate()) {
        modeLabel.textContent = '생년월일을 입력해주세요';
        return;
      }

      let baseDate;
      try {
        baseDate = getSajuBaseDate();
      } catch (error) {
        modeLabel.textContent = error.message;
        return;
      }

      const yearStem = heavenlyStems[baseDate.year % 10];
      const yearBranch = earthlyBranches[((baseDate.year - 4) % 12 + 12) % 12];
      const monthBranch = monthBranches[baseDate.month];
      const timeBranch = timeBranches[sajuTimeSelect.value];
      const sajuResult = getSajuResult(yearStem, yearBranch, monthBranch, timeBranch, sajuMode);
      const selected = sajuResult.selected;
      const resultText = `${baseDate.label} [년주: ${yearStem.hanja}(${yearStem.element}) · 월지: ${monthBranch.hanja}(${monthBranch.element}) · 시지: ${timeBranch.hanja}(${timeBranch.element})]`;
      const guideText = sajuMode === 'boost'
        ? `✨ 당신은 '${sajuResult.targetElement}(${elementHanja[sajuResult.targetElement]})'의 기운이 아주 강하시네요! 그 기운을 듬뿍 담은 번호들을 가져왔어요.`
        : `✨ 사주에 '${sajuResult.targetElement}(${elementHanja[sajuResult.targetElement]})'의 기운이 조금 부족하시군요. 그 부족함을 꽉 채워 균형을 맞춰드릴게요!`;

      modeLabel.textContent = '사주 오행 흐름으로 뽑은 번호입니다.';
      animateRecommendation(selected, 'saju', {
        showMetrics: false,
        onComplete: () => {
          renderBasisLabel(resultText);
          const guide = document.createElement('div');
          guide.className = 'saju-guide';
          guide.textContent = guideText;
          balls.appendChild(guide);
          renderPrizeHistory(selected);
        },
      });
    }

    function setError(message) {
      statusBox.textContent = message;
      statusBox.classList.add('error');
      summary.textContent = '데이터를 불러오지 못했습니다.';
    }

    async function loadData() {
      try {
        const response = await fetch('lotto_data.json', { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`lotto_data.json 요청 실패 (${response.status})`);
        }

        const data = await response.json();
        if (!Array.isArray(data) || data.length === 0) {
          throw new Error('lotto_data.json에 회차 데이터가 없습니다.');
        }

        state.rounds = data.slice().sort((a, b) => Number(a.drwNo) - Number(b.drwNo));
        state.stats = calculateStats(state.rounds);

        const latestDraw = state.rounds.at(-1)?.drwNo;
        summary.textContent = '로또도 사는 놈이 된다!';
        statusBox.textContent = `총 ${state.rounds.length}회차 데이터 기준 · 최신 ${latestDraw}회차까지 반영했습니다.`;
        renderChart(state.stats);
        frequencyButton.disabled = false;
        overdueButton.disabled = false;
      } catch (error) {
        setError(error.message);
      }
    }

    frequencyButton.addEventListener('click', recommendByFrequency);
    overdueButton.addEventListener('click', recommendByOverdue);
    historyFirstButton.addEventListener('click', recommendHistoricalFirstPrize);
    historySecondButton.addEventListener('click', recommendHistoricalSecondPrize);
    fortuneButton.addEventListener('click', recommendFortune);
    sajuButton.addEventListener('click', toggleSajuInput);
    sajuBoostModeButton.addEventListener('click', () => setSajuMode('boost'));
    sajuBalanceModeButton.addEventListener('click', () => setSajuMode('balance'));
    calendarModeInputs.forEach((input) => {
      input.addEventListener('change', () => setCalendarMode(input.value));
    });
    sajuYearInput.addEventListener('input', () => moveFocusWhenFilled(sajuYearInput, sajuMonthInput, 4));
    sajuMonthInput.addEventListener('input', () => moveFocusWhenFilled(sajuMonthInput, sajuDayInput, 2));
    sajuDayInput.addEventListener('input', () => onlyDigits(sajuDayInput));
    sajuConfirmButton.addEventListener('click', recommendSaju);

    loadData();
  </script>
</body>
</html>
